<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC 离线代币转移系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .header h1 {
            font-size: 28px;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .header p {
            color: #aaa;
            font-size: 14px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .balance-display {
            font-size: 32px;
            font-weight: bold;
            color: #00ff88;
            text-align: center;
            padding: 20px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 8px;
            margin: 16px 0;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .key-display {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            word-break: break-all;
            max-height: 100px;
            overflow-y: auto;
            margin: 12px 0;
            font-family: 'Monaco', 'Courier New', monospace;
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 6px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
        }

        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffa500, #ff8c00);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff1493, #d62828);
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 14px;
        }

        .status.success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.4);
        }

        .status.error {
            background: rgba(255, 20, 147, 0.2);
            color: #ff1493;
            border: 1px solid rgba(255, 20, 147, 0.4);
        }

        .status.info {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.4);
        }

        .mining-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #00d4ff;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 16px;
        }

        .modal-text {
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .contact-info {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            padding: 16px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            margin: 16px 0;
            font-family: 'Monaco', 'Courier New', monospace;
        }

        .copy-btn {
            width: 100%;
            margin-top: 12px;
        }

        .modal-close {
            width: 100%;
            margin-top: 12px;
            background: linear-gradient(135deg, #666, #444);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        .tab-btn {
            padding: 12px 16px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #00d4ff;
            border-bottom-color: #00d4ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 12px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #00ff88);
            width: 0%;
            transition: width 0.1s linear;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .balance-display {
                font-size: 28px;
            }

            .mining-stats {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🪙 BTC 离线代币转移系统</h1>
            <p>完全离线运行 · 基于 ECDSA P-256 密码学</p>
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="mining">⛏️ 挖矿</button>
            <button class="tab-btn" data-tab="identity">🔐 身份</button>
            <button class="tab-btn" data-tab="transfer">💸 转账</button>
            <button class="tab-btn" data-tab="receive">📥 接收</button>
        </div>

        <!-- 挖矿标签页 -->
        <div class="tab-content active" id="mining">
            <div class="card">
                <div class="card-title">⛏️ 自动挖矿</div>
                <div class="balance-display" id="miningBalance">0</div>
                <div class="mining-stats">
                    <div class="stat-item">
                        <div class="stat-label">运行时间</div>
                        <div class="stat-value" id="miningTime">00:00:00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">挖矿速率</div>
                        <div class="stat-value">1/2s</div>
                    </div>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="miningProgress"></div>
                </div>
                <div class="button-group">
                    <button class="btn-primary" id="startMiningBtn">启动挖矿</button>
                    <button class="btn-danger" id="stopMiningBtn" disabled>停止挖矿</button>
                </div>
                <div id="miningStatus"></div>
            </div>

            <div class="card">
                <div class="card-title">💰 提现</div>
                <button class="btn-warning" id="withdrawBtn">提现 (显示联系方式)</button>
                <div id="withdrawStatus"></div>
            </div>
        </div>

        <!-- 身份标签页 -->
        <div class="tab-content" id="identity">
            <div class="card">
                <div class="card-title">🔐 身份管理</div>
                <div class="input-group">
                    <label>您的余额</label>
                    <div class="balance-display" id="identityBalance">0</div>
                </div>
                <div class="input-group">
                    <label>公钥 (收款地址)</label>
                    <div class="key-display" id="publicKeyDisplay">未生成</div>
                    <button class="btn-primary" id="copyPublicKeyBtn">复制公钥</button>
                </div>
                <div class="input-group">
                    <label>私钥 (签名用，妥善保管)</label>
                    <div class="key-display" id="privateKeyDisplay">未生成</div>
                    <button class="btn-danger" id="copyPrivateKeyBtn">复制私钥</button>
                </div>
                <div class="button-group">
                    <button class="btn-success" id="generateIdentityBtn">生成新身份</button>
                    <button class="btn-warning" id="importIdentityBtn">导入身份</button>
                </div>
                <div id="identityStatus"></div>
            </div>
        </div>

        <!-- 转账标签页 -->
        <div class="tab-content" id="transfer">
            <div class="card">
                <div class="card-title">💸 生成转账凭证</div>
                <div class="input-group">
                    <label>接收方公钥</label>
                    <textarea id="recipientPublicKey" placeholder="粘贴接收方的公钥..."></textarea>
                </div>
                <div class="input-group">
                    <label>转账金额</label>
                    <input type="number" id="transferAmount" placeholder="输入转账金额" min="1" value="1">
                </div>
                <button class="btn-primary" id="generateTransferBtn">生成转账凭证</button>
                <div id="transferStatus"></div>
                <div class="input-group">
                    <label>转账凭证 (复制后发送给接收方)</label>
                    <textarea id="transferVoucher" readonly placeholder="凭证将显示在这里..."></textarea>
                    <button class="btn-primary" id="copyTransferBtn">复制凭证</button>
                </div>
            </div>
        </div>

        <!-- 接收标签页 -->
        <div class="tab-content" id="receive">
            <div class="card">
                <div class="card-title">📥 验证并接收代币</div>
                <div class="input-group">
                    <label>粘贴收到的转账凭证</label>
                    <textarea id="receiveVoucher" placeholder="粘贴转账凭证..."></textarea>
                </div>
                <button class="btn-success" id="verifyReceiveBtn">验证并接收</button>
                <div id="receiveStatus"></div>
            </div>
        </div>
    </div>

    <!-- 提现模态框 -->
    <div class="modal" id="withdrawModal">
        <div class="modal-content">
            <div class="modal-title">💰 提现申请</div>
            <div class="modal-text">请联系客服处理您的提现申请</div>
            <div class="contact-info" id="contactInfo">15932447705</div>
            <button class="btn-primary" id="copyContactBtn">复制号码</button>
            <button class="modal-close" id="closeWithdrawBtn">关闭</button>
        </div>
    </div>

    <!-- 导入身份模态框 -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-title">导入身份</div>
            <div class="input-group">
                <label>公钥</label>
                <textarea id="importPublicKey" placeholder="粘贴公钥..."></textarea>
            </div>
            <div class="input-group">
                <label>私钥</label>
                <textarea id="importPrivateKey" placeholder="粘贴私钥..."></textarea>
            </div>
            <button class="btn-success" id="confirmImportBtn">确认导入</button>
            <button class="modal-close" id="closeImportBtn">取消</button>
        </div>
    </div>

    <script>
        // ========== 全局状态 ==========
        let publicKey = null;
        let privateKey = null;
        let balance = 0;
        let isMining = false;
        let miningStartTime = 0;
        let lastMiningTime = 0;
        const MINING_INTERVAL = 2000; // 2秒一个币

        // ========== 本地存储 ==========
        function loadState() {
            const saved = localStorage.getItem('cryptoMinerState');
            if (saved) {
                const state = JSON.parse(saved);
                publicKey = state.publicKey;
                privateKey = state.privateKey;
                balance = state.balance || 0;
                updateAllDisplays();
            }
        }

        function saveState() {
            const state = {
                publicKey,
                privateKey,
                balance,
                usedNonces: JSON.parse(localStorage.getItem('usedNonces') || '[]')
            };
            localStorage.setItem('cryptoMinerState', JSON.stringify(state));
        }

        function getUsedNonces() {
            return JSON.parse(localStorage.getItem('usedNonces') || '[]');
        }

        function addUsedNonce(nonce) {
            const nonces = getUsedNonces();
            nonces.push(nonce);
            localStorage.setItem('usedNonces', JSON.stringify(nonces));
        }

        // ========== 密钥管理 ==========
        async function generateKeyPair() {
            const keyPair = await crypto.subtle.generateKey(
                { name: 'ECDSA', namedCurve: 'P-256' },
                true,
                ['sign', 'verify']
            );

            const publicKeyJwk = await crypto.subtle.exportKey('jwk', keyPair.publicKey);
            const privateKeyJwk = await crypto.subtle.exportKey('jwk', keyPair.privateKey);

            publicKey = JSON.stringify(publicKeyJwk);
            privateKey = JSON.stringify(privateKeyJwk);

            balance = 0;
            saveState();
            updateAllDisplays();
            showStatus('identityStatus', '✓ 新身份生成成功！', 'success');
        }

        async function importKeys(pubKeyStr, privKeyStr) {
            try {
                const pubJwk = JSON.parse(pubKeyStr);
                const privJwk = JSON.parse(privKeyStr);

                publicKey = JSON.stringify(pubJwk);
                privateKey = JSON.stringify(privJwk);

                balance = 0;
                saveState();
                updateAllDisplays();
                showStatus('identityStatus', '✓ 身份导入成功！', 'success');
                document.getElementById('importModal').classList.remove('active');
            } catch (e) {
                showStatus('identityStatus', '✗ 导入失败：' + e.message, 'error');
            }
        }

        // ========== 签名和验证 ==========
        async function signPayload(payload) {
            const privJwk = JSON.parse(privateKey);
            const key = await crypto.subtle.importKey('jwk', privJwk, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['sign']);
            const payloadStr = JSON.stringify(payload);
            const signature = await crypto.subtle.sign(
                { name: 'ECDSA', hash: { name: 'SHA-256' } },
                key,
                new TextEncoder().encode(payloadStr)
            );
            return {
                payload,
                signature: btoa(String.fromCharCode(...new Uint8Array(signature))),
                senderPublicKey: publicKey
            };
        }

        async function verifySignature(senderPublicKeyStr, payloadStr, signatureB64) {
            try {
                const pubJwk = JSON.parse(senderPublicKeyStr);
                const key = await crypto.subtle.importKey('jwk', pubJwk, { name: 'ECDSA', namedCurve: 'P-256' }, false, ['verify']);
                const signatureBuffer = Uint8Array.from(atob(signatureB64), c => c.charCodeAt(0));
                const isValid = await crypto.subtle.verify(
                    { name: 'ECDSA', hash: { name: 'SHA-256' } },
                    key,
                    signatureBuffer,
                    new TextEncoder().encode(payloadStr)
                );
                return isValid;
            } catch (e) {
                return false;
            }
        }

        // ========== 转账流程 ==========
        async function generateTransferVoucher() {
            if (!publicKey || !privateKey) {
                showStatus('transferStatus', '✗ 请先生成身份', 'error');
                return;
            }

            const recipientPubKey = document.getElementById('recipientPublicKey').value.trim();
            const amount = parseInt(document.getElementById('transferAmount').value);

            if (!recipientPubKey || !amount || amount <= 0) {
                showStatus('transferStatus', '✗ 请填写接收方公钥和转账金额', 'error');
                return;
            }

            if (balance < amount) {
                showStatus('transferStatus', '✗ 余额不足', 'error');
                return;
            }

            const nonce = crypto.randomUUID();
            const payload = {
                recipientPublicKey: recipientPubKey,
                amount: amount,
                nonce: nonce,
                timestamp: Date.now()
            };

            const signed = await signPayload(payload);
            const voucher = btoa(JSON.stringify(signed));

            balance -= amount;
            saveState();
            updateAllDisplays();

            document.getElementById('transferVoucher').value = voucher;
            showStatus('transferStatus', `✓ 转账凭证已生成，您的余额已扣除 ${amount} 个代币`, 'success');
        }

        // ========== 接收流程 ==========
        async function verifyAndReceive() {
            if (!publicKey) {
                showStatus('receiveStatus', '✗ 请先生成身份', 'error');
                return;
            }

            const voucherStr = document.getElementById('receiveVoucher').value.trim();

            if (!voucherStr) {
                showStatus('receiveStatus', '✗ 请粘贴转账凭证', 'error');
                return;
            }

            try {
                const signed = JSON.parse(atob(voucherStr));
                const payload = signed.payload;
                const signature = signed.signature;
                const senderPublicKey = signed.senderPublicKey;

                // 检查接收方是否匹配
                if (payload.recipientPublicKey !== publicKey) {
                    showStatus('receiveStatus', '✗ 这个凭证不是发给您的', 'error');
                    return;
                }

                // 检查是否已使用
                const usedNonces = getUsedNonces();
                if (usedNonces.includes(payload.nonce)) {
                    showStatus('receiveStatus', '✗ 这个凭证已被使用过（防双花）', 'error');
                    return;
                }

                // 验证签名
                const payloadStr = JSON.stringify(payload);
                const isValid = await verifySignature(senderPublicKey, payloadStr, signature);

                if (!isValid) {
                    showStatus('receiveStatus', '✗ 签名验证失败，凭证可能被篡改', 'error');
                    return;
                }

                // 全部通过，接收代币
                balance += payload.amount;
                addUsedNonce(payload.nonce);
                saveState();
                updateAllDisplays();

                document.getElementById('receiveVoucher').value = '';
                showStatus('receiveStatus', `✓ 成功接收 ${payload.amount} 个代币！`, 'success');
            } catch (e) {
                showStatus('receiveStatus', '✗ 凭证格式错误或验证失败：' + e.message, 'error');
            }
        }

        // ========== 挖矿 ==========
        function startMining() {
            if (isMining) return;
            isMining = true;
            miningStartTime = Date.now();
            lastMiningTime = Date.now();

            document.getElementById('startMiningBtn').disabled = true;
            document.getElementById('stopMiningBtn').disabled = false;
            showStatus('miningStatus', '⛏️ 挖矿已启动...', 'info');

            const miningLoop = setInterval(() => {
                if (!isMining) {
                    clearInterval(miningLoop);
                    return;
                }

                const now = Date.now();
                if (now - lastMiningTime >= MINING_INTERVAL) {
                    balance += 1;
                    lastMiningTime = now;
                    saveState();
                    updateAllDisplays();
                }

                const elapsed = now - lastMiningTime;
                const progress = (elapsed / MINING_INTERVAL) * 100;
                document.getElementById('miningProgress').style.width = progress + '%';

                const totalSeconds = Math.floor((now - miningStartTime) / 1000);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                document.getElementById('miningTime').textContent = 
                    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }, 100);
        }

        function stopMining() {
            isMining = false;
            document.getElementById('startMiningBtn').disabled = false;
            document.getElementById('stopMiningBtn').disabled = true;
            document.getElementById('miningProgress').style.width = '0%';
            showStatus('miningStatus', '⏹️ 挖矿已停止', 'info');
        }

        // ========== UI 更新 ==========
        function updateAllDisplays() {
            document.getElementById('miningBalance').textContent = balance;
            document.getElementById('identityBalance').textContent = balance;
            document.getElementById('publicKeyDisplay').textContent = publicKey || '未生成';
            document.getElementById('privateKeyDisplay').textContent = privateKey ? privateKey.substring(0, 50) + '...' : '未生成';
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // ========== 事件监听 ==========
        document.getElementById('generateIdentityBtn').addEventListener('click', generateKeyPair);
        document.getElementById('importIdentityBtn').addEventListener('click', () => {
            document.getElementById('importModal').classList.add('active');
        });
        document.getElementById('confirmImportBtn').addEventListener('click', () => {
            const pubKey = document.getElementById('importPublicKey').value.trim();
            const privKey = document.getElementById('importPrivateKey').value.trim();
            importKeys(pubKey, privKey);
        });
        document.getElementById('closeImportBtn').addEventListener('click', () => {
            document.getElementById('importModal').classList.remove('active');
        });

        document.getElementById('copyPublicKeyBtn').addEventListener('click', () => {
            if (publicKey) {
                navigator.clipboard.writeText(publicKey);
                showStatus('identityStatus', '✓ 公钥已复制', 'success');
            }
        });

        document.getElementById('copyPrivateKeyBtn').addEventListener('click', () => {
            if (privateKey) {
                navigator.clipboard.writeText(privateKey);
                showStatus('identityStatus', '✓ 私钥已复制', 'success');
            }
        });

        document.getElementById('generateTransferBtn').addEventListener('click', generateTransferVoucher);
        document.getElementById('copyTransferBtn').addEventListener('click', () => {
            const voucher = document.getElementById('transferVoucher').value;
            if (voucher) {
                navigator.clipboard.writeText(voucher);
                showStatus('transferStatus', '✓ 凭证已复制', 'success');
            }
        });

        document.getElementById('verifyReceiveBtn').addEventListener('click', verifyAndReceive);

        document.getElementById('startMiningBtn').addEventListener('click', startMining);
        document.getElementById('stopMiningBtn').addEventListener('click', stopMining);

        document.getElementById('withdrawBtn').addEventListener('click', () => {
            document.getElementById('withdrawModal').classList.add('active');
        });

        document.getElementById('copyContactBtn').addEventListener('click', () => {
            navigator.clipboard.writeText('15932447705');
            showStatus('withdrawStatus', '✓ 号码已复制', 'success');
        });

        document.getElementById('closeWithdrawBtn').addEventListener('click', () => {
            document.getElementById('withdrawModal').classList.remove('active');
        });

        // 标签页切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.getAttribute('data-tab');
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        // 模态框外部关闭
        document.getElementById('withdrawModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('withdrawModal')) {
                document.getElementById('withdrawModal').classList.remove('active');
            }
        });

        document.getElementById('importModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('importModal')) {
                document.getElementById('importModal').classList.remove('active');
            }
        });

        // 初始化
        loadState();
    </script>
</body>
</html>
