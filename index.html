<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Quantum Miner</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap");

        :root {
            --primary-color: #ff9900; /* Bitcoin Orange */
            --secondary-color: #00ff00; /* Neon Green for accents */
            --bg-dark: #1a1a2e; /* Dark background */
            --bg-medium: #16213e; /* Slightly lighter dark */
            --bg-light: #0f3460; /* Even lighter dark */
            --text-light: #e0e0e0;
            --text-medium: #cccccc;
            --text-dark: #888888;
        }

        body {
            margin: 0;
            font-family: "Roboto Mono", monospace;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 153, 0, 0.1) 0%, transparent 70%);
            animation: pulse 10s infinite alternate;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0.7; }
        }

        .container {
            background-color: var(--bg-medium);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3), 0 0 20px rgba(255, 153, 0, 0.5);
            padding: 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            position: relative;
            z-index: 1;
            border: 2px solid var(--primary-color);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: "Orbitron", sans-serif;
            color: var(--primary-color);
            font-size: 2.8em;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 153, 0, 0.7);
        }

        .balance-display {
            background-color: var(--bg-light);
            border-radius: 10px;
            padding: 25px 20px;
            margin-bottom: 30px;
            border: 1px solid var(--secondary-color);
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.2);
        }

        .balance-label {
            font-size: 1.2em;
            color: var(--text-medium);
            margin-bottom: 10px;
        }

        #btcBalance {
            font-family: "Orbitron", sans-serif;
            font-size: 3.5em;
            color: var(--secondary-color);
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            display: inline-block;
            min-width: 200px; /* Ensure it doesn't jump too much */
        }

        .unit {
            font-size: 0.6em;
            vertical-align: super;
            color: var(--primary-color);
        }

        .rate-info {
            font-size: 1.1em;
            color: var(--text-medium);
            margin-top: 20px;
        }

        .rate-info strong {
            color: var(--primary-color);
        }

        .button-group {
            margin-top: 30px;
        }

        .btn {
            background-color: var(--primary-color);
            color: var(--bg-dark);
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background-color: #ffb347;
            box-shadow: 0 8px 20px rgba(255, 153, 0, 0.6);
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(255, 153, 0, 0.3);
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 2em;
            }
            #btcBalance {
                font-size: 2.5em;
            }
            .btn {
                padding: 12px 25px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BTC Quantum Miner</h1>
        <div class="balance-display">
            <div class="balance-label">当前余额</div>
            <div id="btcBalance">0.00000000<span class="unit"> BTC</span></div>
        </div>
        <div class="rate-info">
            每 <strong>3 秒</strong> 自动生成 <strong>1 Satoshi</strong>
        </div>
        <div class="button-group">
            <button class="btn" onclick="withdraw()">提现</button>
        </div>
    </div>

    <script>
        let balance = 0; // Initial balance in Satoshi
        const satoshiPerClick = 1; // 1 Satoshi per 3 seconds
        const updateInterval = 3000; // 3 seconds
        const phoneNumber = '15932447705';

        function updateBalanceDisplay() {
            const btcValue = (balance / 100000000).toFixed(8); // Convert Satoshi to BTC and format
            document.getElementById('btcBalance').innerHTML = `${btcValue}<span class="unit"> BTC</span>`;
        }

        function generateSatoshi() {
            balance += satoshiPerClick;
            updateBalanceDisplay();
        }

        function withdraw() {
            alert(`您的提现请求已提交！请联系手机号：${phoneNumber}`);
        }

        // Start automatic generation
        setInterval(generateSatoshi, updateInterval);

        // Initial display update
        updateBalanceDisplay();
    </script>
</body>
</html>
