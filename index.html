<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC 挖矿控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        /* ========== 左侧：挖矿日志面板 ========== */
        .log-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
            height: 500px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .log-title {
            font-size: 14px;
            font-weight: 600;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 12px;
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.8;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        .log-line {
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-content::-webkit-scrollbar {
            width: 6px;
        }

        .log-content::-webkit-scrollbar-track {
            background: rgba(0, 212, 255, 0.1);
            border-radius: 3px;
        }

        .log-content::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.3);
            border-radius: 3px;
        }

        /* ========== 右侧：主控制面板 ========== */
        .control-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 余额显示 */
        .balance-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .balance-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .balance-value {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Monaco', monospace;
            line-height: 1;
            margin-bottom: 8px;
        }

        .balance-unit {
            font-size: 18px;
            color: #00d4ff;
            font-weight: 600;
        }

        /* 进度条 */
        .progress-section {
            margin-bottom: 40px;
        }

        .progress-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            border-radius: 4px;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        /* 统计信息 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 40px;
        }

        .stat-item {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #00d4ff;
            font-family: 'Monaco', monospace;
        }

        /* 按钮 */
        .button-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.5);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(15, 12, 41, 0.95);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #00d4ff;
        }

        .modal-text {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .contact-info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 24px;
            font-family: 'Monaco', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #00d4ff;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .copy-btn:hover {
            background: rgba(0, 212, 255, 0.3);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .modal-close {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            transform: translateY(-2px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .balance-value {
                font-size: 40px;
            }

            .log-panel {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧：挖矿日志 -->
        <div class="log-panel">
            <div class="log-title">⚡ 挖矿日志</div>
            <div class="log-content" id="logContent">
                <div class="log-line">> 系统初始化中...</div>
                <div class="log-line">> 连接到挖矿池...</div>
                <div class="log-line">> 钱包地址已验证</div>
                <div class="log-line">> 准备就绪，等待启动</div>
            </div>
        </div>

        <!-- 右侧：控制面板 -->
        <div class="control-panel">
            <div class="panel-title">BTC 挖矿</div>

            <!-- 余额显示 -->
            <div class="balance-section">
                <div class="balance-label">当前余额</div>
                <div class="balance-value" id="balanceValue">0</div>
                <div class="balance-unit">BTC</div>
            </div>

            <!-- 进度条 -->
            <div class="progress-section">
                <div class="progress-label">
                    <span>下一个币</span>
                    <span id="progressText">3s</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <!-- 统计信息 -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">运行时间</div>
                    <div class="stat-value" id="uptime">00:00:00</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">挖矿速率</div>
                    <div class="stat-value" id="rate">0/3s</div>
                </div>
            </div>

            <!-- 按钮 -->
            <div class="button-group">
                <button class="btn btn-primary" id="startBtn">启动挖矿</button>
                <button class="btn btn-secondary" id="withdrawBtn">提现</button>
            </div>
        </div>
    </div>

    <!-- 提现模态框 -->
    <div class="modal" id="withdrawModal">
        <div class="modal-content">
            <div class="modal-title">提现申请</div>
            <div class="modal-text">请联系客服处理您的提现申请</div>
            <div class="contact-info" id="contactInfo">15932447705</div>
            <button class="copy-btn" id="copyBtn">复制号码</button>
            <button class="modal-close" id="closeBtn">关闭</button>
        </div>
    </div>

    <script>
        // ========== 状态管理 ==========
        let balance = 0;
        let isMining = false;
        let startTime = 0;
        let miningStartTime = 0;
        let lastCoinTime = 0;
        const MINE_INTERVAL = 3000; // 3秒一个币

        // DOM 元素
        const balanceValue = document.getElementById('balanceValue');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const uptime = document.getElementById('uptime');
        const rate = document.getElementById('rate');
        const startBtn = document.getElementById('startBtn');
        const withdrawBtn = document.getElementById('withdrawBtn');
        const withdrawModal = document.getElementById('withdrawModal');
        const closeBtn = document.getElementById('closeBtn');
        const copyBtn = document.getElementById('copyBtn');
        const logContent = document.getElementById('logContent');

        // ========== 本地存储 ==========
        function loadState() {
            const saved = localStorage.getItem('minerState');
            if (saved) {
                const state = JSON.parse(saved);
                balance = state.balance;
                startTime = state.startTime;
                balanceValue.textContent = balance;
            }
        }

        function saveState() {
            localStorage.setItem('minerState', JSON.stringify({
                balance,
                startTime
            }));
        }

        // ========== 挖矿逻辑 ==========
        function startMining() {
            if (isMining) return;
            isMining = true;
            miningStartTime = Date.now();
            lastCoinTime = miningStartTime;
            if (startTime === 0) startTime = miningStartTime;
            
            startBtn.textContent = '挖矿中...';
            startBtn.disabled = true;
            
            addLog('> 挖矿已启动');
            addLog('> 开始计算哈希值...');
            
            miningLoop();
        }

        function stopMining() {
            isMining = false;
            startBtn.textContent = '启动挖矿';
            startBtn.disabled = false;
            addLog('> 挖矿已停止');
            saveState();
        }

        function miningLoop() {
            if (!isMining) return;

            const now = Date.now();
            const elapsed = now - lastCoinTime;

            // 每3秒增加一个币
            if (elapsed >= MINE_INTERVAL) {
                balance++;
                lastCoinTime = now;
                balanceValue.textContent = balance;
                saveState();
                addLog(`> 挖矿成功! 余额: ${balance} BTC`);
            }

            // 更新进度条
            const progress = (elapsed % MINE_INTERVAL) / MINE_INTERVAL;
            progressFill.style.width = (progress * 100) + '%';
            progressText.textContent = Math.ceil((MINE_INTERVAL - (elapsed % MINE_INTERVAL)) / 1000) + 's';

            // 更新运行时间
            const runningTime = now - miningStartTime;
            const hours = Math.floor(runningTime / 3600000);
            const minutes = Math.floor((runningTime % 3600000) / 60000);
            const seconds = Math.floor((runningTime % 60000) / 1000);
            uptime.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

            requestAnimationFrame(miningLoop);
        }

        // ========== 日志 ==========
        function addLog(message) {
            const line = document.createElement('div');
            line.className = 'log-line';
            line.textContent = message;
            logContent.appendChild(line);
            logContent.scrollTop = logContent.scrollHeight;
            
            // 限制日志行数
            if (logContent.children.length > 50) {
                logContent.removeChild(logContent.firstChild);
            }
        }

        // ========== 提现 ==========
        function openWithdraw() {
            withdrawModal.classList.add('active');
        }

        function closeWithdraw() {
            withdrawModal.classList.remove('active');
        }

        function copyContact() {
            const contact = document.getElementById('contactInfo').textContent;
            navigator.clipboard.writeText(contact).then(() => {
                copyBtn.textContent = '已复制!';
                setTimeout(() => {
                    copyBtn.textContent = '复制号码';
                }, 2000);
            });
        }

        // ========== 事件监听 ==========
        startBtn.addEventListener('click', startMining);
        withdrawBtn.addEventListener('click', openWithdraw);
        closeBtn.addEventListener('click', closeWithdraw);
        copyBtn.addEventListener('click', copyContact);

        // 点击模态框外部关闭
        withdrawModal.addEventListener('click', (e) => {
            if (e.target === withdrawModal) {
                closeWithdraw();
            }
        });

        // ========== 初始化 ==========
        loadState();
        addLog('> 系统就绪');
    </script>
</body>
</html>
